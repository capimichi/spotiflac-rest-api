basePath: /
definitions:
  models.DownloadRequest:
    properties:
      album_artist:
        description: Artista dell'album. Facoltativo, usato per la scrittura dei tag
          ID3/FLAC nei download da link diretti o ricerca ISRC.
        example: Taylor Swift
        type: string
      album_name:
        description: Nome dell'album. Facoltativo, usato per la scrittura dei tag
          ID3/FLAC nei download da link diretti o ricerca ISRC.
        example: Reputation
        type: string
      artist_name:
        description: Nome dell'artista principale. Obbligatorio solo se non viene
          fornito un URL. Nei link diretti, serve come metadato di fallback.
        example: Taylor Swift
        type: string
      filename_format:
        description: 'Formato di salvataggio per il nome del file. Supporta tag dinamici
          come {artist}, {title}, {album}. Default: "{artist} - {title}"'
        example: '{artist} - {title}'
        type: string
      isrc:
        description: Codice ISRC (International Standard Recording Code) del brano.
          Obbligatorio solo per il download diretto tramite metadati (se non viene
          fornito un URL).
        example: USUM71703861
        type: string
      output_dir:
        description: 'Cartella sul server in cui salvare i file musicali scaricati.
          Default: "./downloads"'
        example: ./downloads
        type: string
      quality:
        description: Qualità del download. Per Qobuz (es. "6" per Hi-Res). Per Tidal/Amazon
          (es. "LOSSLESS" per qualità CD FLAC). Se omesso, viene applicato un valore
          predefinito ottimale.
        example: "6"
        type: string
      release_date:
        description: Data di pubblicazione del brano (es. YYYY-MM-DD). Facoltativo,
          usato per i tag ID3/FLAC.
        example: "2017-08-24"
        type: string
      service:
        description: |-
          Servizio di streaming musicale di destinazione da cui effettuare il download effettivo dei file.
          @Enums qobuz, tidal, amazon
        example: qobuz
        type: string
      spotify_id:
        description: ID Spotify del brano. Facoltativo, utile come riferimento per
          collegare l'ISRC in caso di download diretto senza URL.
        example: 1OCaN2Vv7f7F1QGq5Q7P9H
        type: string
      track_name:
        description: Titolo del brano. Obbligatorio solo se non viene fornito un URL.
          Nei link diretti, serve come metadato di fallback.
        example: Look What You Made Me Do
        type: string
      url:
        description: URL del brano, album, playlist o artista da scaricare. Supporta
          link Spotify (es. https://open.spotify.com/track/...) oppure link diretti
          Tidal, Amazon Music o Qobuz. Obbligatorio a meno che non si specifichi la
          triade isrc, track_name e artist_name.
        example: https://open.spotify.com/track/4PTG3Z6ehGkBFmzsOhswXP
        type: string
    type: object
  models.Task:
    properties:
      completed_tracks:
        type: integer
      created_at:
        type: string
      current_track:
        type: string
      downloaded_files:
        items:
          type: string
        type: array
      error:
        type: string
      id:
        type: string
      quality:
        type: string
      service:
        type: string
      spotify_url:
        type: string
      status:
        $ref: '#/definitions/models.TaskStatus'
      total_tracks:
        type: integer
      updated_at:
        type: string
    type: object
  models.TaskStatus:
    enum:
    - pending
    - resolving
    - downloading
    - completed
    - failed
    type: string
    x-enum-varnames:
    - StatusPending
    - StatusResolving
    - StatusDownloading
    - StatusCompleted
    - StatusFailed
host: localhost:8080
info:
  contact: {}
  description: A lightweight REST API wrapper for the SpotiFLAC backend.
  title: SpotiFLAC REST API
  version: "1.0"
paths:
  /api/download:
    post:
      consumes:
      - application/json
      description: Avvia un task di download in background e restituisce immediatamente
        l'ID del task
      parameters:
      - description: Parametri di download
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.DownloadRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Contiene task_id, status e message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Richiesta malformata
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Avvia download asincrono
      tags:
      - Download
  /api/download/sync:
    post:
      consumes:
      - application/json
      description: Avvia il download e si blocca finché tutti i file non sono stati
        scaricati e taggati
      parameters:
      - description: Parametri di download
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.DownloadRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Contiene status e l'elenco dei file
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Richiesta malformata
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Errore durante il download
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Avvia download sincrono
      tags:
      - Download
  /api/health:
    get:
      description: Verifica se il server API è attivo e funzionante
      produces:
      - application/json
      responses:
        "200":
          description: status ok
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - System
  /api/status/{id}:
    get:
      description: Restituisce lo stato attuale di un download asincrono specificando
        l'ID del task
      parameters:
      - description: ID del task
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Task'
        "404":
          description: Task non trovato
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Traccia lo stato del task
      tags:
      - Download
swagger: "2.0"
